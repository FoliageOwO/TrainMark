services:
  postgres:
    image: postgres:16-alpine
    container_name: trainmark-postgres
    environment:
      POSTGRES_DB: trainmark_ai
      POSTGRES_USER: trainmark
      POSTGRES_PASSWORD: trainmark_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainmark -d trainmark_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trainmark-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: trainmark-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: trainmark
      RABBITMQ_DEFAULT_PASS: trainmark_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: trainmark-minio
    environment:
      MINIO_ROOT_USER: trainmark
      MINIO_ROOT_PASSWORD: trainmark_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: trainmark-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
