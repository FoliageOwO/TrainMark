server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: course-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/courses/**,/api/assignments/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
